<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" width="680" height="380">
  <defs>
    <radialGradient id="r1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="rc">
      <rect width="680" height="380" rx="16"/>
    </clipPath>
  </defs>

  <rect width="680" height="380" rx="16" fill="#05050a"/>

  <g clip-path="url(#rc)">
    <ellipse cx="100" cy="180" rx="220" ry="180" fill="url(#r1)">
      <animateTransform attributeName="transform" type="translate" values="0,0;40,20;-20,40;0,0" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="580" cy="200" rx="200" ry="170" fill="url(#r2)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-40,20;20,-30;0,0" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="340" cy="370" rx="250" ry="120" fill="url(#r3)">
      <animateTransform attributeName="transform" type="translate" values="0,0;20,-40;-40,10;0,0" dur="14s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <text x="40" y="42" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="2">FEATURED PROJECTS</text>

  <rect x="40" y="60" width="600" height="80" rx="10" fill="#0d0d1a" stroke="#10b981" stroke-width="0.8"/>
  <text x="58" y="88" font-family="sans-serif" font-size="16" font-weight="700" fill="#6ee7b7">llucloh.github.io</text>
  <text x="58" y="114" font-family="sans-serif" font-size="13" fill="#94a3b8">Hacking blog featuring detailed CTF write-ups</text>

  <rect x="40" y="160" width="600" height="96" rx="10" fill="#0d0d1a" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="58" y="188" font-family="sans-serif" font-size="16" font-weight="700" fill="#67e8f9">masvs-web-checklist</text>
  <text x="58" y="214" font-family="sans-serif" font-size="13" fill="#94a3b8">An elegant, local-first web checklist for the OWASP MASVS v2. Designed to</text>
  <text x="58" y="232" font-family="sans-serif" font-size="13" fill="#64748b">track and export mobile app security assessments.</text>
</svg>
