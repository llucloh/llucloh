<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="i1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="i2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="i3" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>

  <clipPath id="clip">
    <rect width="1000" height="260" rx="16"/>
  </clipPath>
</defs>

<rect width="1000" height="260" rx="16" fill="#06060f"/>

<g clip-path="url(#clip)">

  <ellipse cx="80" cy="120" rx="220" ry="170" fill="url(#i1)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0;50,40;-40,20;30,-50;0,0"
      dur="11s"
      repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="900" cy="80" rx="220" ry="170" fill="url(#i2)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0;-40,50;30,-30;-50,40;0,0"
      dur="13s"
      repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="500" cy="260" rx="320" ry="120" fill="url(#i3)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0;30,-40;-50,20;40,-30;0,0"
      dur="9s"
      repeatCount="indefinite"/>
  </ellipse>

</g>

<text
    x="40"
    y="40"
    font-family="'Times New Roman', Times, serif"
    font-size="13"
    fill="#94a3b8"
    letter-spacing="2">
INTERESTS
</text>

<!-- Offensive Security -->
<rect x="40" y="60" width="180" height="36" rx="8"
      fill="#1e1b4b" stroke="#6366f1"/>
<text x="130" y="83"
      text-anchor="middle"
      font-family="monospace"
      font-size="13"
      fill="#c7d2fe">
Offensive Security
</text>

<!-- Penetration Testing -->
<rect x="235" y="60" width="200" height="36" rx="8"
      fill="#1c1917" stroke="#f59e0b"/>
<text x="335" y="83"
      text-anchor="middle"
      font-family="monospace"
      font-size="13"
      fill="#fde68a">
Penetration Testing
</text>

<!-- Red Teaming -->
<rect x="450" y="60" width="150" height="36" rx="8"
      fill="#0c1a2e" stroke="#06b6d4"/>
<text x="525" y="83"
      text-anchor="middle"
      font-family="monospace"
      font-size="13"
      fill="#67e8f9">
Red Teaming
</text>

<!-- Linux -->
<rect x="615" y="60" width="90" height="36" rx="8"
      fill="#0d1f13" stroke="#10b981"/>
<text x="660" y="83"
      text-anchor="middle"
      font-family="monospace"
      font-size="13"
      fill="#86efac">
Linux
</text>

<!-- CTF -->
<rect x="720" y="60" width="230" height="36" rx="8"
      fill="#1a0f2e" stroke="#ec4899"/>
<text x="835" y="83"
      text-anchor="middle"
      font-family="monospace"
      font-size="13"
      fill="#f9a8d4">
Capture The Flag (CTF)
</text>

<!-- Virtualization -->
<rect x="40" y="115" width="270" height="36" rx="8"
      fill="#2e1065" stroke="#a855f7"/>
<text x="175" y="138"
      text-anchor="middle"
      font-family="monospace"
      font-size="13"
      fill="#d8b4fe">
Virtualization &amp; Homelabs
</text>

<!-- Open Source -->
<rect x="325" y="115" width="150" height="36" rx="8"
      fill="#0d1f13" stroke="#10b981"/>
<text x="400" y="138"
      text-anchor="middle"
      font-family="monospace"
      font-size="13"
      fill="#86efac">
Open Source
</text>

</svg>
