<svg width="680" height="190" viewBox="0 0 680 190" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg-green" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#10b981" stop-opacity="0.45"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/></radialGradient>
  <radialGradient id="bg-red" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.4"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></radialGradient>
  <radialGradient id="bg-blue" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/><stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/></radialGradient>
  <clipPath id="card-clip"><rect width="680" height="190" rx="16"/></clipPath>
</defs>

<rect width="680" height="190" rx="16" fill="#05050a"/>

<g clip-path="url(#card-clip)">
  <ellipse cx="90" cy="90" rx="180" ry="140" fill="url(#bg-green)">
    <animateTransform attributeName="transform" type="translate" values="0,0;30,20;-20,30;10,-30;0,0" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <ellipse cx="580" cy="110" rx="190" ry="130" fill="url(#bg-red)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-30,30;20,-20;-40,10;0,0" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <ellipse cx="340" cy="160" rx="160" ry="90" fill="url(#bg-blue)">
    <animateTransform attributeName="transform" type="translate" values="0,0;20,-30;-30,10;20,-10;0,0" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
</g>

